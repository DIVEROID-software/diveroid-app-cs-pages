const markers = [];

pts.forEach(p => {
  const r = p.log_count > 0 ? Math.min(5 + Math.log(p.log_count+1)*2.5, 20) : 6;
  const color = p.source === 'db' ? '#50A9FC' : '#27ae60';
  const m = L.circleMarker([p.lat, p.lng], {
    radius:r, fillColor:color, color:'#fff', weight:1.5, fillOpacity:0.85
  }).bindPopup(`
    <div style="min-width:140px">
      <b style="font-size:14px">${p.name}</b><br>
      <span style="color:#888;font-size:12px">${p.name_en}</span><br>
      ${p.log_count > 0 ? `<br>📊 <b>${p.log_count}</b> dive logs` : ''}
    </div>
  `).addTo(map);
  markers.push({m, p});
});

function searchPt(q) {
  if (!q) { markers.forEach(x => x.m.addTo(map)); return; }
  q = q.toLowerCase();
  markers.forEach(x => {
    if (x.p.name.toLowerCase().includes(q) || (x.p.name_en||'').toLowerCase().includes(q)) {
      x.m.addTo(map);
    } else {
      map.removeLayer(x.m);
    }
  });
}

function downloadCSV() {
  const rows = ['\uFEFFname,name_en,lat,lng,log_count'];
  pts.forEach(p => rows.push(`${p.name},${p.name_en},${p.lat},${p.lng},${p.log_count}`));
  const blob = new Blob([rows.join('\n')], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'diveroid_jeju_points.csv';
  a.click();
}
